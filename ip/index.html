<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络环境检测 | IP查询</title>
    <!-- 引入独立样式 -->
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h2>🌐 网络环境检测</h2>
            <p>实时查询您的公网IP与网络属性</p>
        </div>

        <!-- 新增IP搜索区域 -->
        <div class="search-box">
            <input type="text" id="ipInput" placeholder="输入IPv4/IPv6地址查询">
            <button id="searchBtn">查询</button>
            <button id="resetBtn">查看本机</button>
        </div>

        <div class="info-list">
            <div class="info-item">
                <span class="info-label">查询IP</span>
                <span class="info-value" id="queryIp"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">国家地区</span>
                <span class="info-value" id="area"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">经纬度</span>
                <span class="info-value" id="locationCoord"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">时区</span>
                <span class="info-value" id="timezone"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">运营商ISP</span>
                <span class="info-value" id="isp"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">机房组织</span>
                <span class="info-value" id="org"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">AS编号</span>
                <span class="info-value" id="asInfo"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">代理检测</span>
                <span class="info-value" id="proxyCheck"><span class="loading"></span>检测中...</span>
            </div>
        </div>

        <div class="card-footer">
            <a href="/">← 返回首页</a>
        </div>
    </div>

    <!-- 外部JS逻辑文件 -->
    <script src="./ip-detect.js"></script>
</body>
</html>
