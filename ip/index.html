    <link rel="stylesheet" href="/retro-theme.css">
    <style>
        /* ==========================================================================
           🌐 仅限 IP 查询工具页面使用的局部排版与组件微调（同步纯字符流）
           ========================================================================== */
        body {
            max-width: 850px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        /* 降维控制台主区域：干掉实色盒子与多余边框 */
        .card {
            width: 100%;
            max-width: 650px;
            margin: 20px auto;
            background: transparent;
        }
        .card-header {
            margin-bottom: 20px;
        }
        /* 搜索功能区 */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        #ipInput {
            flex: 1;
            padding: 6px 10px;
            font-family: inherit;
            font-size: 14px;
            color: #111111;
            background: #ffffff;
            border: 1px solid #111111;
            outline: none;
        }
        #ipInput:focus {
            background: #fcfcfc; /* 保持极简干净的微调 */
        }
        /* 按钮改回符合 retro-theme.css 定义的 < 按钮 > 终端硬核风格 */
        .search-box button {
            padding: 6px 16px;
            background: #ffffff;
            border: 1px solid #111111;
            color: #111111;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-box button::before { content: "< "; }
        .search-box button::after { content: " >"; }
        .search-box button:active {
            background: #111111;
            color: #ffffff;
        }
        /* 数据清单：完美的纯字符报表清爽风格 */
        .info-list {
            display: flex;
            flex-direction: column;
            background: transparent;
        }
        .info-item {
            display: grid;
            grid-template-columns: 140px 1fr;
            align-items: center;
            padding: 10px 6px;
            border-bottom: 1px dotted #cccccc; /* 极轻的点状分隔线 */
            gap: 10px;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-item:nth-child(even) {
            background-color: transparent; /* 取消交替深色底，确保通透 */
        }
        .info-label {
            color: #555555;
            font-size: 13px;
            font-weight: bold;
        }
        .info-label::before { content: "├─ "; } /* 树状字符前缀 */
        .info-value {
            color: #111111;
            font-size: 14px;
            word-break: break-all;
        }
        /* 状态标识：精简样式 */
        .badge {
            display: inline-block;
            padding: 2px 6px;
            font-size: 12px;
            font-weight: bold;
            font-family: monospace;
        }
        .badge-ok { background: #ffffff; color: #006600; border: 1px dashed #006600; }
        .badge-warn { background: #111111; color: #ffffff; }
        .badge-gray { background: #ffffff; color: #555555; border: 1px dashed #555555; }
        /* 复古闪烁等待方块 */
        .loading {
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: #111111;
            margin-right: 6px;
            animation: blink 0.8s steps(2, start) infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            to { visibility: hidden; }
        } /* 🛠️ 补上了原代码这里缺失的闭合括号，修复移动端自适应 Bug */

        /* 📱 移动端自适应微调 */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .card { margin-top: 15px; }
            .info-item { grid-template-columns: 1fr; gap: 2px; padding: 10px 4px; }
            .info-label::before { content: "• "; }
            .search-box { flex-direction: column; gap: 8px; }
            .search-box button { width: 100%; padding: 8px; }
        }
    </style>
</head>
<body>
    <div id="common-nav" class="tui-menu">

    <div class="card">
        <div class="card-header tui-header-bar">
            [ NETWORK_ENVIRONMENT_DETECTOR ]
        </div>
        <div class="search-box">
            <input type="text" id="ipInput" placeholder="输入IPv4/IPv6地址查询...">
            <button id="searchBtn">查询(S)</button>
            <button id="resetBtn">本机(R)</button>
        </div>
        <div class="info-list">
            <div class="info-item">
                <span class="info-label">查询中心 IP</span>
                <span class="info-value" id="queryIp"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">地理归属地</span>
                <span class="info-value" id="area"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">经纬度坐标</span>
                <span class="info-value" id="locationCoord"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">所处时区</span>
                <span class="info-value" id="timezone"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">运营商 (ISP)</span>
                <span class="info-value" id="isp"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">组织机构</span>
                <span class="info-value" id="org"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">自治系统号</span>
                <span class="info-value" id="asInfo"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">代理安全检测</span>
                <span class="info-value" id="proxyCheck"><span class="loading"></span>检测中...</span>
            </div>
        </div>
    </div>
