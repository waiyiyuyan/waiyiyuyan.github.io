    <style>
        /* ==========================================================================
           🌐 仅限 IP 查询工具页面使用的局部排版与组件微调
           ========================================================================== */
        body {
            min-height: 100vh;
            padding: 24px 16px;
            display: block;
        }

        /* 控制台主卡片：限定宽度与外边距 */
        .card {
            width: 100%;
            max-width: 580px;
            padding: 24px;
            margin: 60px auto 20px auto;
        }

        .card-header {
            margin-bottom: 24px;
        }

        /* 搜索功能区：横向弹性排布 */
        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        
        #ipInput {
            flex: 1;
            padding: 6px 8px;
            font-family: inherit;
            font-size: 14px;
            color: #000;
            outline: none;
        }
        #ipInput:focus {
            background: #ffffcc; /* 聚焦时变成经典怀旧淡黄纸质感 */
        }
        
        /* 怀旧立体物理按钮局部样式 */
        .search-box button {
            padding: 6px 16px;
            background: #d4d0c8;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            color: #000;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-box button:active {
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 7px 15px 5px 17px;
        }

        /* 数据清单：紧凑的表格连线风格 */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 0; 
            background: #fafafa;
        }
        .info-item {
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #d4d0c8;
            gap: 10px;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-item:nth-child(even) {
            background-color: #f1f1f1; /* 经典的交替行深浅底色 */
        }
        
        .info-label {
            color: #555;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .info-value {
            color: #000000;
            font-size: 14px;
            word-break: break-all;
            font-weight: normal;
        }

        /* 标签纯色标识 */
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border: 1px inset #fff;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-ok { background: #c0ffc0; color: #006600; }
        .badge-warn { background: #ffc0c0; color: #cc0000; }
        .badge-gray { background: #e0e0e0; color: #444; }

        /* 复古方块刻度等待效果 */
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #000080;
            margin-right: 6px;
            animation: blink 0.8s steps(2, start) infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            to { visibility: hidden; }
        }

        /* 📱 移动端自适应微调 */
        @media (max-width: 480px) {
            body { padding: 10px; }
            .card { padding: 16px; margin-top: 65px; }
            .info-item { grid-template-columns: 1fr; gap: 2px; padding: 8px; }
            .search-box { flex-direction: column; gap: 6px; }
            .search-box button { width: 100%; padding: 8px; }
            .retro-title-bar h2 {
                color: #ffffff !important;         /* 强制设置为白色 */
                font-size: 16px !important;        /* 统一标题大小 */
                margin: 0 !important;              /* 清除默认间距 */
                
                /* 强制换行配置 */
                white-space: normal !important;    
                word-break: break-all !important;  /* 确保长字符强制换行 */
                max-width: 100%;
            }
        }
    </style>
</head>

            <div class="info-item">

            <div class="info-item">
