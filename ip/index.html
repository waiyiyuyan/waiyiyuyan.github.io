<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络环境检测 | IP查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px 36px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header h2 {
            font-size: 24px;
            color: #1a202c;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-header p {
            color: #718096;
            font-size: 14px;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 28px;
        }

        .info-item {
            display: grid;
            grid-template-columns: 100px 1fr;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #edf2f7;
            gap: 12px;
        }

        .info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            color: #718096;
            font-size: 14px;
            font-weight: 500;
        }

        .info-value {
            color: #2d3748;
            font-size: 16px;
            font-weight: 500;
            word-break: break-all;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .badge-ok {
            background: #f0fff4;
            color: #22543d;
        }

        .badge-warn {
            background: #fff5f5;
            color: #742a2a;
        }

        .badge-gray {
            background: #f7fafc;
            color: #718096;
        }

        .card-footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #edf2f7;
        }

        .card-footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .card-footer a:hover {
            color: #5a67d8;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .card {
                padding: 30px 24px;
            }
            .info-item {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .info-label {
                font-size: 13px;
            }
            .info-value {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h2>🌐 网络环境检测</h2>
            <p>实时查询您的公网IP与网络属性</p>
        </div>

        <div class="info-list">
            <div class="info-item">
                <span class="info-label">IPv4 地址</span>
                <span class="info-value" id="ipv4"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">IPv6 地址</span>
                <span class="info-value" id="ipv6"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">IP 归属地</span>
                <span class="info-value" id="location"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">运营商</span>
                <span class="info-value" id="isp"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">代理检测</span>
                <span class="info-value" id="proxyCheck"><span class="loading"></span>检测中...</span>
            </div>
        </div>

        <div class="card-footer">
            <a href="/">← 返回首页</a>
        </div>
    </div>

    <script>
        const el = {
            ipv4: document.getElementById('ipv4'),
            ipv6: document.getElementById('ipv6'),
            location: document.getElementById('location'),
            isp: document.getElementById('isp'),
            proxyCheck: document.getElementById('proxyCheck')
        };

        // 云服务商/机房关键词库
        const cloudKeywords = [
            "Cloudflare", "DigitalOcean", "Vultr", "Linode", "AWS", "Amazon",
            "Azure", "GCP", "Google Cloud", "OVH", "Contabo", "Hetzner",
            "Bandwagon", "搬瓦工", "VPS", "Datacenter", "数据中心",
            "腾讯云", "阿里云", "华为云", "百度云", "UCloud", "青云"
        ];

        /**
         * 带超时的 fetch 封装
         */
        function fetchWithTimeout(url, timeout = 5000) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), timeout);
            return fetch(url, { signal: controller.signal }).finally(() => clearTimeout(timer));
        }

        /**
         * 主接口：ip-api.com 强制IPv4
         */
        function getIPv4Info() {
            return fetchWithTimeout('https://ip4.ip-api.com/json/?lang=zh-CN')
                .then(res => res.ok ? res.json() : null)
                .catch(() => null);
        }

        /**
         * 主接口：ip-api.com 强制IPv6
         */
        function getIPv6Info() {
            return fetchWithTimeout('https://ip6.ip-api.com/json/?lang=zh-CN')
                .then(res => res.ok ? res.json() : null)
                .catch(() => null);
        }

        /**
         * 备用接口：国内CSDN JSONP接口（网络不通时降级使用）
         */
        function getFallbackInfo() {
            return new Promise((resolve) => {
                const callbackName = 'csdnIpCallback_' + Date.now();
                window[callbackName] = (res) => {
                    if (res && res.code === 200) {
                        resolve({
                            query: res.data.ip,
                            country: res.data.country,
                            regionName: res.data.province,
                            city: res.data.city,
                            isp: res.data.isp
                        });
                    } else {
                        resolve(null);
                    }
                };

                const script = document.createElement('script');
                script.src = `https://searchplugin.csdn.net/api/v1/ip/get?callback=${callbackName}`;
                script.onerror = () => resolve(null);
                document.body.appendChild(script);
            });
        }

        /**
         * 代理判断逻辑
         */
        function judgeProxy(data) {
            const result = { isProxy: false, reason: "普通家用/企业宽带", level: "ok" };
            const isp = (data.isp || data.org || "").toString().toLowerCase();

            const hit = cloudKeywords.some(keyword => 
                isp.includes(keyword.toLowerCase())
            );

            if (hit) {
                result.isProxy = true;
                result.reason = "机房IP，疑似代理/VPN";
                result.level = "warn";
            }

            return result;
        }

        /**
         * 填充页面数据
         */
        function fillData(data) {
            el.location.textContent = [data.country, data.regionName, data.city].filter(Boolean).join(" · ");
            el.isp.textContent = data.isp || "未知";

            const proxyRes = judgeProxy(data);
            el.proxyCheck.className = `badge badge-${proxyRes.level}`;
            el.proxyCheck.textContent = proxyRes.isProxy 
                ? `⚠️ ${proxyRes.reason}` 
                : `✅ ${proxyRes.reason}`;
        }

        /**
         * 主执行函数
         */
        async function runDetect() {
            // 并行请求双栈主接口
            const [v4Data, v6Data] = await Promise.all([getIPv4Info(), getIPv6Info()]);

            // 主接口有一个成功即可正常展示
            if (v4Data || v6Data) {
                // 填充IPv4
                if (v4Data && v4Data.query) {
                    el.ipv4.textContent = v4Data.query;
                    fillData(v4Data); // 用IPv4的归属地信息作为展示基准
                } else {
                    el.ipv4.textContent = "无可用IPv4出口";
                    el.ipv4.style.color = "#999";
                }

                // 填充IPv6
                if (v6Data && v6Data.query) {
                    el.ipv6.textContent = v6Data.query;
                    // 如果IPv4失败，用IPv6的归属地信息
                    if (!v4Data) fillData(v6Data);
                } else {
                    el.ipv6.textContent = "未启用IPv6";
                    el.ipv6.style.color = "#999";
                }

                // 极端情况：两个IP都拿到但归属地都没填充到（理论不会出现）
                if (el.location.textContent.includes("查询中")) {
                    el.location.textContent = "无法获取";
                    el.isp.textContent = "无法获取";
                    el.proxyCheck.className = "badge badge-gray";
                    el.proxyCheck.textContent = "数据不足，无法检测";
                }

                return;
            }

            // 主接口全部失败，走国内备用接口
            const fallbackData = await getFallbackInfo();
            if (fallbackData) {
                // 备用接口无法区分双栈，只展示当前连接的IP
                el.ipv4.textContent = fallbackData.query;
                el.ipv6.textContent = "未检测（单IP模式）";
                el.ipv6.style.color = "#999";
                fillData(fallbackData);
            } else {
                // 全部接口失败
                el.ipv4.textContent = "获取失败";
                el.ipv6.textContent = "获取失败";
                el.location.textContent = "获取失败";
                el.isp.textContent = "获取失败";
                el.proxyCheck.className = "badge badge-gray";
                el.proxyCheck.textContent = "网络异常，检测失败";
            }
        }

        runDetect();
    </script>
</body>
</html>
