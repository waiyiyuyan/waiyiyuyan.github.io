    <style>

           💾 经典系统复古怀旧风格（Classic Terminal / Win95 Retro）

        * {

        body {

           🎛️ 硬核复古“大头显”控制台面板
           ========================================================================== */
        .card {
            width: 100%;
            max-width: 580px;
            background: #ffffff;
            /* 经典的像素级双色立体硬边框（Windows 经典凹凸边框效果） */
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            padding: 24px;
            margin: 60px auto 20px auto;
            box-shadow: 1px 1px 0px #000000;
        }

        /* 顶部深蓝系统标头栏 */
        .card-header {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 6px 10px;
            margin-bottom: 24px;
            border: 1px inset #fff;
        }
        .card-header h2 {
            font-size: 16px;
            color: #ffffff;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: left;
        }
        /* 副标题表现为系统底部的说明行 */

        }

        /* ==========================================================================
           ⌨️ 命令行式输入框与像素立体按钮
           ========================================================================== */
        .search-box {

            margin-bottom: 20px;
        }
        #ipInput {
            flex: 1;

            background: #ffffff;

            border-left: 2px solid #808080;
            border-right: 2px solid #dfdfdf;
            border-bottom: 2px solid #dfdfdf;
            font-family: inherit;
            font-size: 14px;
            color: #000;
            outline: none;
        }
        #ipInput:focus {
            background: #ffffcc; /* 聚焦时变成经典怀旧淡黄纸质感 */
        }
        
        /* 怀旧立体物理按钮 */
        .search-box button {
            padding: 6px 16px;
            background: #d4d0c8;
            border-top: 2px solid #fff;
            border-left: 2px solid #fff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            color: #000;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }
        .search-box button:active {
            /* 按下时反转立体边框，产生真实的物理按下感 */
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 7px 15px 5px 17px;
        }

        /* ==========================================================================
           📊 纯表格/表单式复古数据清单
           ========================================================================== */
        .info-list {
            display: flex;
            flex-direction: column;
            gap: 0; /* 采用紧凑的无间缝表格连线风格 */
            border-top: 2px solid #808080;
            border-left: 2px solid #808080;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            background: #fafafa;
        }
        .info-item {
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #d4d0c8;
            gap: 10px;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-item:nth-child(even) {
            background-color: #f1f1f1; /* 经典的交替行深浅底色（便于阅读） */
        }
        
        .info-label {
            color: #555;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .info-value {
            color: #000000;
            font-size: 14px;
            word-break: break-all;
            font-weight: normal;
        }

        /* ==========================================================================
           🏷️ 经典状态纯色标识
           ========================================================================== */
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border: 1px inset #fff;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-ok {
            background: #c0ffc0;
            color: #006600;
        }
        .badge-warn {
            background: #ffc0c0;
            color: #cc0000;
        }
        .badge-gray {
            background: #e0e0e0;
            color: #444;
        }

        /* 复古方块刻度等待效果 */
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            background-color: #000080;
            margin-right: 6px;
            animation: blink 0.8s steps(2, start) infinite;
            vertical-align: middle;
        }
        @keyframes blink {
            to { visibility: hidden; }
        }

        /* ==========================================================================
           📱 移动端自适应微调
           ========================================================================== */
        @media (max-width: 480px) {

            }

                gap: 2px;
                padding: 8px;
            }
            .search-box {
                flex-direction: column;
                gap: 6px;
            }
            .search-box button {
                width: 100%;
                padding: 8px;
