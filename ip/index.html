<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络环境检测 | IP查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            padding: 40px 36px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header h2 {
            font-size: 24px;
            color: #1a202c;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-header p {
            color: #718096;
            font-size: 14px;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 28px;
        }

        .info-item {
            display: grid;
            grid-template-columns: 100px 1fr;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #edf2f7;
            gap: 12px;
        }

        .info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            color: #718096;
            font-size: 14px;
            font-weight: 500;
        }

        .info-value {
            color: #2d3748;
            font-size: 16px;
            font-weight: 500;
            word-break: break-all;
            line-height: 1.5;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .badge-ok {
            background: #f0fff4;
            color: #22543d;
        }

        .badge-warn {
            background: #fff5f5;
            color: #742a2a;
        }

        .badge-gray {
            background: #f7fafc;
            color: #718096;
        }

        .card-footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid #edf2f7;
        }

        .card-footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .card-footer a:hover {
            color: #5a67d8;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .card {
                padding: 30px 24px;
            }
            .info-item {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .info-label {
                font-size: 13px;
            }
            .info-value {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h2>🌐 网络环境检测</h2>
            <p>实时查询您的公网IP与网络属性</p>
        </div>

        <div class="info-list">
            <div class="info-item">
                <span class="info-label">IPv4 地址</span>
                <span class="info-value" id="ipv4"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">IPv6 地址</span>
                <span class="info-value" id="ipv6"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">IP 归属地</span>
                <span class="info-value" id="location"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">运营商</span>
                <span class="info-value" id="isp"><span class="loading"></span>查询中...</span>
            </div>
            <div class="info-item">
                <span class="info-label">代理检测</span>
                <span class="info-value" id="proxyCheck"><span class="loading"></span>检测中...</span>
            </div>
        </div>

        <div class="card-footer">
            <a href="/">← 返回首页</a>
        </div>
    </div>

    <!-- 引入外部JS文件 -->
    <script src="./ip-detect.js"></script>
</body>
</html>
