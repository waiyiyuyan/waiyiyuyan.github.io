<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网络环境检测</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f8; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .info { margin: 15px 0; font-size: 18px; color: #333; }
        .label { font-weight: bold; color: #555; }
        .warn { color: red; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🌐 网络环境检测</h2>
        <div class="info"><span class="label">当前 IP:</span> <span id="ip">查询中...</span></div>
        <div class="info"><span class="label">归属地:</span> <span id="loc">查询中...</span></div>
        <div class="info"><span class="label">运营商:</span> <span id="isp">查询中...</span></div>
        <br>
        <a href="/">返回首页</a>
    </div>

    <script>
        async function getIPInfo() {
            const ipEl = document.getElementById('ip');
            const locEl = document.getElementById('loc');
            const ispEl = document.getElementById('isp');

            // 备用国内JSONP接口，解决CORS跨域问题
            const apiUrl = 'https://api.ip.sb/geoip?callback=parseIpData';

            // JSONP 处理函数
            window.parseIpData = function(data) {
                ipEl.innerText = data.ip || '未知';
                // 拼接归属地
                let location = '';
                if (data.country) location += data.country;
                if (data.region) location += ' ' + data.region;
                if (data.city) location += ' ' + data.city;
                locEl.innerText = location || '未知';

                const isp = data.isp || data.organization || '未知';
                ispEl.innerText = isp;

                // 检测代理/云服务器标识
                const proxyKeywords = ['Cloudflare', 'DigitalOcean', 'Vultr', 'Linode', 'AWS', 'Azure', 'GCP'];
                const isProxy = proxyKeywords.some(key => isp.includes(key));
                if (isProxy) {
                    ispEl.innerHTML += ' <span class="warn">(⚠️ 疑似代理/VPN)</span>';
                }
            }

            // 创建script标签实现JSONP跨域请求
            const script = document.createElement('script');
            script.src = apiUrl;
            script.onerror = function() {
                ipEl.innerText = '获取失败';
                locEl.innerText = '获取失败';
                ispEl.innerText = '获取失败';
            };
            document.body.appendChild(script);
        }
        getIPInfo();
    </script>
</body>
</html>
