<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>优质博文 | 我爱白嫖</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <h1>✍️ 优质博文</h1>
        <p>技术教程 · 经验分享</p>
    </header>

    <div class="blog-list" id="blogList">
        <div style="text-align: center; color: #999;">🔄 正在加载文章列表...</div>
    </div>

    <script src="/nav.js"></script>

    <script>
        // 🗑️ 原来的侧边栏开关逻辑 toggleMenu() 已经删除，全部交由上面的 nav.js 处理

        // 🔄 动态读取文章列表 JSON（保持不变）
        fetch('./posts.json')
            .then(res => { if(!res.ok) throw new Error(); return res.json(); })
            .then(data => {
                const listDiv = document.getElementById('blogList');
                if(!data || data.length === 0) {
                    listDiv.innerHTML = '<div style="text-align:center;color:#999;">📭 暂无博文发布。</div>';
                    return;
                }
                
                let html = '';
                data.forEach(post => {
                    html += `
                        <div class="post-item">
                            <div class="post-info">
                                <h2><a href="./articles/${post.file}">${post.title}</a></h2>
                                <div class="post-meta">📅 发布日期: ${post.date} · 🏷️ 分类: ${post.category}</div>
                            </div>
                            <a href="./articles/${post.file}" class="read-more">阅读全文 →</a>
                        </div>
                    `;
                });
                listDiv.innerHTML = html;
            })
            .catch(() => {
                document.getElementById('blogList').innerHTML = '<div style="text-align:center;color:#dc3545;">❌ 文章列表加载失败。</div>';
            });
    </script>
</body>
</html>
