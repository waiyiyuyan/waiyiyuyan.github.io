    <script>
        fetch('./data.json')
            .then(response => {
                if (!response.ok) throw new Error('未能加载到今日节点数据');
                return response.json();
            })
            .then(data => {
                const contentDiv = document.getElementById('content');
                if (!data || data.length === 0) {
                    contentDiv.innerHTML = '<div class="loading-text">⚠️ 今日暂无节点推荐，请稍后再试。</div>';
                    return;
                }

                let htmlContent = '';
                data.forEach(item => {
                    let listItems = '';
                    if (item.list && Array.isArray(item.list) && item.list.length > 0) {
                        listItems = `<ul>${item.list.map(li => `<li>${li}</li>`).join('')}</ul>`;
                    }

                    let dateHtml = item.publishDate ? `<div class="node-status-bar">📅 发布更新于: ${item.publishDate}</div>` : '';

                    let descHtml = '';
                    if (item.desc) {
                        const htmlDesc = item.desc.trim().replace(/\n/g, '<br>');
                        descHtml = `<p>${htmlDesc}</p>`;
                    }

                    htmlContent += `
                        <div class="node-card">
                            <div class="node-card-title-bar">
                                <h2>📄 NODE_DATA - ${item.title}</h2>
                                <div class="mini-controls">
                                    <button onclick="javascript:void(0)">X</button>
                                </div>
                            </div>
                            ${dateHtml}
                            ${descHtml}
                            ${listItems}
                        </div>
                    `;
                });

                contentDiv.innerHTML = htmlContent;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `
                    <div class="loading-text" style="color: #cc0000; border: 2px inset #fff; background: #fff; padding: 20px;">
                        ❌ 错误：节点数据加载失败。请检查本地网络配置并刷新页面重试。

                `;
                console.error(error);
            });
