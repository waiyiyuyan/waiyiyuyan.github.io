    <script>
        fetch('./data.json')
            .then(response => {
                if (!response.ok) throw new Error('未能加载到今日节点数据');
                return response.json();
            })
            .then(data => {
                const contentDiv = document.getElementById('content');
                if (!data || data.length === 0) {
                    contentDiv.innerHTML = '<div style="text-align:center; padding:30px; font-family:monospace;">! [NOTICE]: 今日暂无节点推荐，请稍后再试。</div>';
                    return;
                }

                let htmlContent = '';
                data.forEach(item => {
                    let listItems = '';
                    if (item.list && Array.isArray(item.list) && item.list.length > 0) {
                        listItems = `<ul>${item.list.map(li => `<li>${li}</li>`).join('')}</ul>`;
                    }

                    // 日期改用极简前缀区分
                    let dateHtml = item.publishDate ? `<div class="info-label" style="font-size:12px; color:#777777;">UPDATED: ${item.publishDate}</div>` : '';

                    let descHtml = '';
                    if (item.desc) {
                        const htmlDesc = item.desc.trim().replace(/\n/g, '<br>');
                        descHtml = `<p>${htmlDesc}</p>`;
                    }

                    // 动态生成的节点卡片：利用顶部的字符贯穿线充当天然分割
                    htmlContent += `
                        <div class="node-card">
                            <div class="tui-header-bar" style="margin-bottom: 10px; font-size: 13px;">
                                DATA // ${item.title}
                            </div>
                            ${dateHtml}
                            ${descHtml}
                            ${listItems}
                        </div>
                    `;
                });

                contentDiv.innerHTML = htmlContent;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `
                    <div style="color: #111111; text-align: center; padding: 20px; font-family: monospace;">
                        ------------------------------------------------------------<br>
                        ERROR: 节点数据加载失败。请检查本地网络配置并刷新页面重试。<br>
                        ------------------------------------------------------------
                    </div>
                `;
                console.error(error);
            });
    </script>
