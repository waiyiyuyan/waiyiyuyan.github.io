name: Daily Auto Crawl and Deploy

on:
  schedule:
    - cron: '30 0 * * *' # 每天北京时间 8:30 运行
  workflow_dispatch: # 允许手动触发

# 赋予这个脚本极高且安全的官方发布权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. 检出代码（彻底关掉子模块，不听它的）
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: false

    # 2. 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    # 3. 安装你 package.json 里的依赖
    - name: Install Dependencies
      run: npm ci

    # 4. 运行你的爬虫脚本
    - name: Run Crawler
      run: node crawl.js

    # 5. 自动把爬虫生成的新文章保存回仓库
    - name: Commit and Push New Posts
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add source/_posts/
        git diff-index --quiet HEAD || git commit -m "chore: auto update daily posts"
        git push origin main

    # 6. 让 Hexo 生成静态网页文件夹（public）
    - name: Build Hexo Site
      run: |
        npx hexo clean
        npx hexo generate

    # 7. 这一步是官方大招：直接把生成的网页打包并交给 GitHub 官方服务器去发布
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./public

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4