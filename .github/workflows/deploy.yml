name: Hexo Auto Deploy

on:
  push:
    branches:
      - main # 只要 main 分支有任何风吹草动（你本地推的，或者爬虫塞的），就触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. 拿到你的博客源码
    - name: Checkout Source
      uses: actions/checkout@v4

    # 2. 设置 Node.js 环境
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Hexo 建议用稳定的旧版 Node 运行环境，兼容性最好
        cache: 'npm'

    # 3. 安装 Hexo 和主题所需的依赖
    - name: Install Dependencies
      run: npm install

    # 4. 【核心】在云端代替你运行三连命令：生成静态网页
    - name: Generate Hexo Files
      run: |
        npx hexo clean
        npx hexo generate

    # 5. 精准发布到当前仓库的 gh-pages 分支
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }} # 这是一个系统自带的隐形钥匙，不需要你手动配置
        publish_branch: gh-pages
        publish_dir: ./public