<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>我的全网去水印下载站</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; text-align: center; background: #f5f7fa; }
        input, select { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        button { padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 6px; display: none; word-break: break-all; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h2>🚀 我的专属全能视频下载器</h2>
    <p>支持 Twitter, TikTok, Instagram, Reddit 等平台</p>
    
    <input type="text" id="videoUrl" placeholder="请粘贴视频长链接...">
    <br>

    <select id="qualitySelect">
        <option value="1080">🔥 最高画质 (1080P / Max)</option>
        <option value="720">📺 720P 标准</option>
        <option value="480">📱 480P 标清</option>
        <option value="360">📱 360P 流畅</option>
        <option value="audio">🎵 只要音频 (纯 MP3/M4A)</option>
    </select>
    <br>

    <button onclick="startDownload()">开始解析</button>

    <div id="result"></div>

    <script>
        const MY_API_URL = "https://zhaojing986-my-cobalt-downloader.hf.space/";

        async function startDownload() {
            const userInput = document.getElementById('videoUrl').value.trim();
            // ✨ 获取用户当前选择的清晰度值
            const selectedQuality = document.getElementById('qualitySelect').value;
            const resultDiv = document.getElementById('result');
            
            if (!userInput) {
                alert('请先输入网址！');
                return;
            }

            resultDiv.style.display = 'block';
            resultDiv.className = 'loading';
            resultDiv.innerHTML = '正在疯狂解析中，请稍候...';

            // 根据选择是否为 audio，动态调整传给后端的参数
            const isAudio = selectedQuality === 'audio';

            try {
                const response = await fetch(MY_API_URL, {
                    method: "POST",
                    headers: {
                        "Accept": "application/json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        url: userInput,
                        videoQuality: isAudio ? "720" : selectedQuality, // 如果是音频，画质参数随便传个默认的
                        isAudioOnly: isAudio, // ✨ 如果选了音频，告诉后端“我只要声音”
                        filenameStyle: "nerdy"
                    })
                });

                const data = await response.json();

                if (data.status === 'redirect' || data.status === 'tunnel') {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <strong>🎉 解析成功！</strong><br><br>
                        <a href="${data.url}" target="_blank" download="${data.filename || 'download.mp4'}" style="display:inline-block; padding:10px 20px; background:#28a745; color:white; text-decoration:none; border-radius:4px;">
                            点击下载：${data.filename || '点击保存文件'}
                        </a>
                    `;
                } else if (data.status === 'error') {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `❌ 解析失败：${data.error.code}`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `⚠️ 未知状态: ${data.status}`;
                }

            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `💥 无法连接到 API，请检查后端状态。错误: ${error.message}`;
            }
        }
    </script>
</body>
</html>
